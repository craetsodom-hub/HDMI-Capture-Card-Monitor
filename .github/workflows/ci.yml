name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore HDMI-Capture-Card-Monitor.sln
      - name: Build
        run: dotnet build HDMI-Capture-Card-Monitor.sln --configuration Release -p:Platform=x64 --no-restore
      - name: Test
        run: dotnet test HDMI-Capture-Card-Monitor.sln --configuration Release -p:Platform=x64 --no-build --no-restore
